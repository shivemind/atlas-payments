apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-payments
  namespace: atlas-production
  labels:
    app: atlas-payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-payments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: atlas-payments
    spec:
      containers:
        - name: atlas-payments
          image: PLACEHOLDER_ECR_REGISTRY/atlas-payments:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      terminationGracePeriodSeconds: 30
