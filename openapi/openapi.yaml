  /api/v1/setup_intents/{id}/confirm:
    post:
      summary: Confirm setup intent
      description: >
        Confirms a setup intent by attaching a payment method and transitioning through CREATED → PROCESSING →
        SUCCEEDED/FAILED. Uses deterministic mock: payment methods with last4 ending in "5" fail, otherwise succeed.
        Emits `setup_intent.succeeded` or `setup_intent.failed`.
      x-platform:
        kind: transition
        entity: SetupIntent
        stateChanges:
          - created -> processing -> succeeded
          - created -> processing -> failed
        emitsEvents:
          - setup_intent.succeeded
          - setup_intent.failed
        affectsLedger: false
        workflowRefs:
          - attach_payment_method
      operationId: confirmSetupIntent
      tags:
        - SetupIntents
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method_id
              properties:
                payment_method_id:
                  type: string
                  description: ID of the payment method to confirm with.
            examples:
              confirm:
                value:
                  payment_method_id: cmf1pm123
      responses:
        "200":
          description: Setup intent confirmed; final status is succeeded or failed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - setup_intent
                properties:
                  setup_intent:
                    type: object
              examples:
                succeeded:
                  value:
                    setup_intent:
                      id: cmf1si123
                      merchant_id: cmf1merchant123
                      customer_id: cmf1customer123
                      payment_method_id: cmf1pm123
                      status: succeeded
                      usage: off_session
                failed:
                  value:
                    setup_intent:
                      id: cmf1si456
                      merchant_id: cmf1merchant123
                      customer_id: cmf1customer123
                      payment_method_id: cmf1pm456
                      status: failed
                      usage: off_session
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Setup intent or payment method not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid state transition (not in created status).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidTransition:
                  value:
                    error:
                      code: INVALID_STATE_TRANSITION
                      message: Cannot transition from 'SUCCEEDED' to 'PROCESSING'.
  /api/v1/setup_intents/{id}/cancel:
