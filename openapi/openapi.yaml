openapi: 3.1.0
info:
  title: Atlas Payments API
  version: 0.2.0
  description: Core payment processing — intents, captures, refunds, balance, and payment methods
  contact:
    name: AtlasPayments Team
    url: https://github.com/shivemind/atlaspayments
servers:
  - url: http://localhost:3000
    description: Local development server. Override via Postman {{baseUrl}} environment variable.
tags:
  - name: Auth
    description: API key identity and authentication endpoints
  - name: Customers
    description: Customer lifecycle management
  - name: PaymentMethods
    description: Payment method tokenization and management
  - name: SetupIntents
    description: Setup intents for attaching payment methods to customers
  - name: PaymentIntents
    description: Payment intent create, confirm, capture, and cancel
  - name: Refunds
    description: Refund processing and queries
  - name: Balances
    description: Merchant balance snapshots derived from ledger
  - name: Ops
    description: Health, readiness, and operational checks
  - name: Ledger
    description: Ledger account queries and balance transactions
paths:
  /api/health:
    get:
      summary: Health check
      description: Returns a lightweight liveness status. No DB or Redis dependency.
      x-platform:
        kind: ops
        entity: HealthCheck
        affectsLedger: false
      operationId: getHealth
      tags:
        - Ops
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: atlaspayments
                  timestamp:
                    type: string
                    format: date-time
              examples:
                healthy:
                  value:
                    status: ok
                    service: atlaspayments
                    timestamp: 2026-02-27T23:30:00.000Z
  /api/readiness:
    get:
      summary: Readiness check
      description: Returns readiness status including database connectivity.
      x-platform:
        kind: ops
        entity: ReadinessCheck
        affectsLedger: false
      operationId: getReadiness
      tags:
        - Ops
      responses:
        "200":
          description: Service and all dependencies are ready.
          content:
            application/json:
              examples:
                ready:
                  value:
                    status: ready
                    service: atlaspayments
                    checks:
                      database: ok
                    timestamp: 2026-03-01T12:00:00.000Z
        "503":
          description: Service is not ready — one or more dependencies are unavailable.
          content:
            application/json:
              examples:
                notReady:
                  value:
                    status: not_ready
                    service: atlaspayments
                    checks:
                      database: error
                    timestamp: 2026-03-01T12:00:00.000Z
  /api/v1/me:
    get:
      summary: Get current API key identity
      description: Returns the authenticated merchant and API key metadata.
      x-platform:
        kind: resource
        entity: ApiKey
        affectsLedger: false
      operationId: getCurrentIdentity
      tags:
        - Auth
      security:
        - MerchantKeyAuth: []
      responses:
        "200":
          description: Merchant and API key metadata for the authenticated key.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                type: object
                required:
                  - merchant
                  - apiKey
                properties:
                  merchant:
                    type: object
                    required:
                      - id
                      - name
                      - status
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      status:
                        type: string
                  apiKey:
                    type: object
                    required:
                      - id
                      - name
                      - role
                      - scopes
                      - keyPrefix
                      - createdAt
                      - lastUsedAt
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                        enum:
                          - MERCHANT
                          - PLATFORM_ADMIN
                      scopes:
                        type: array
                        items:
                          type: string
                      keyPrefix:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      lastUsedAt:
                        type: string
                        format: date-time
                        nullable: true
              examples:
                merchantKey:
                  value:
                    merchant:
                      id: cmf1merchant123
                      name: Acme Merchant
                      status: ACTIVE
                    apiKey:
                      id: cmf1apikey123
                      name: Primary key
                      role: MERCHANT
                      scopes:
                        - me:read
                        - payments:read
                      keyPrefix: sk_test_va
                      createdAt: 2026-02-27T23:30:00.000Z
                      lastUsedAt: null
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                authRequired:
                  value:
                    error:
                      code: AUTH_REQUIRED
                      message: Authorization bearer token is required.
        "429":
          description: Fixed-window rate limit exceeded.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                limited:
                  value:
                    error:
                      code: RATE_LIMITED
                      message: Rate limit exceeded.
  /api/v1/customers:
    get:
      summary: List customers
      description: Returns a paginated list of customers for the authenticated merchant.
      x-platform:
        kind: resource
        entity: Customer
        affectsLedger: false
      operationId: listCustomers
      tags:
        - Customers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of merchant customers.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
              examples:
                pageOne:
                  value:
                    data:
                      - id: cmf1customer123
                        merchantId: cmf1merchant123
                        email: customer@example.com
                        name: Jane Customer
                        createdAt: 2026-02-28T10:00:00.000Z
                    pagination:
                      page: 1
                      pageSize: 10
                      total: 1
                      hasMore: false
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create customer
      description: Creates a new customer record scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: Customer
        emitsEvents: []
        affectsLedger: false
        workflowRefs:
          - attach_payment_method
          - subscription_lifecycle
      operationId: createCustomer
      tags:
        - Customers
      security:
        - MerchantKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                externalId:
                  type: string
                  description: Caller-defined external reference ID.
                email:
                  type: string
                  format: email
                name:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              basic:
                value:
                  externalId: cust_ext_001
                  email: customer@example.com
                  name: Jane Customer
                  metadata:
                    tier: gold
      responses:
        "201":
          description: Customer created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - customer
                properties:
                  customer:
                    type: object
                    required:
                      - id
                      - merchantId
                      - createdAt
                      - updatedAt
                    properties:
                      id:
                        type: string
                      merchantId:
                        type: string
                      externalId:
                        type: string
                        nullable: true
                      email:
                        type: string
                        nullable: true
                      name:
                        type: string
                        nullable: true
                      metadata:
                        type: object
                        additionalProperties: true
                        nullable: true
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
              examples:
                created:
                  value:
                    customer:
                      id: "{{customerId}}"
                      merchantId: cmf1merchant123
                      externalId: cust_ext_001
                      email: customer@example.com
                      name: Jane Customer
                      metadata:
                        tier: gold
                      createdAt: 2026-02-28T10:00:00.000Z
                      updatedAt: 2026-02-28T10:00:00.000Z
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/customers/{id}:
    get:
      summary: Get customer by ID
      description: Returns a single customer record scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: Customer
        affectsLedger: false
      operationId: getCustomerById
      tags:
        - Customers
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Customer found for the authenticated merchant.
          content:
            application/json:
              schema:
                type: object
                required:
                  - customer
                properties:
                  customer:
                    type: object
              examples:
                found:
                  value:
                    customer:
                      id: "{{customerId}}"
                      merchantId: cmf1merchant123
                      email: customer@example.com
                      name: Jane Customer
                      createdAt: 2026-02-28T10:00:00.000Z
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      code: CUSTOMER_NOT_FOUND
                      message: Customer not found.
  /api/v1/payment_methods:
    get:
      summary: List payment methods
      description: Returns a paginated list of payment methods for the authenticated merchant, with optional filters.
      x-platform:
        kind: resource
        entity: PaymentMethod
        affectsLedger: false
      operationId: listPaymentMethods
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: customer_id
          description: Filter by customer ID.
          schema:
            type: string
        - in: query
          name: type
          description: Filter by payment method type.
          schema:
            type: string
            enum:
              - card
              - bank_account
              - wallet
        - in: query
          name: status
          description: Filter by payment method status.
          schema:
            type: string
            enum:
              - active
              - expired
              - revoked
      responses:
        "200":
          description: Paginated list of payment methods.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
              examples:
                page:
                  value:
                    data:
                      - id: cmf1pm123
                        merchant_id: cmf1merchant123
                        customer_id: cmf1customer123
                        type: card
                        status: active
                        last4: "4242"
                        brand: visa
                    pagination:
                      page: 1
                      pageSize: 10
                      total: 1
                      hasMore: false
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create payment method
      description: >
        Attaches a tokenized payment method to a customer. Uses deterministic mock processing: last4 ending in "5" →
        expired, otherwise active. Emits `payment_method.created`.
      x-platform:
        kind: transition
        entity: PaymentMethod
        stateChanges:
          - created
        emitsEvents:
          - payment_method.created
        affectsLedger: false
        workflowRefs:
          - attach_payment_method
      operationId: createPaymentMethod
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_id
                - last4
              properties:
                customer_id:
                  type: string
                  description: ID of the customer to attach the payment method to.
                type:
                  type: string
                  enum:
                    - card
                    - bank_account
                    - wallet
                  default: card
                last4:
                  type: string
                  minLength: 4
                  maxLength: 4
                  pattern: ^\d{4}$
                  description: Last 4 digits of the payment instrument.
                brand:
                  type: string
                  description: Card brand (e.g. visa, mastercard).
                expiry_month:
                  type: integer
                  minimum: 1
                  maximum: 12
                expiry_year:
                  type: integer
                  minimum: 2024
                  maximum: 2099
                billing_name:
                  type: string
                billing_email:
                  type: string
                  format: email
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              visa:
                value:
                  customer_id: "{{customerId}}"
                  type: card
                  last4: "4242"
                  brand: visa
                  expiry_month: 12
                  expiry_year: 2028
                  billing_name: Jane Customer
                  billing_email: jane@example.com
      responses:
        "201":
          description: Payment method created and attached to customer.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payment_method
                properties:
                  payment_method:
                    type: object
                    required:
                      - id
                      - merchant_id
                      - customer_id
                      - type
                      - status
                      - created_at
                      - updated_at
                    properties:
                      id:
                        type: string
                      merchant_id:
                        type: string
                      customer_id:
                        type: string
                      type:
                        type: string
                        enum:
                          - card
                          - bank_account
                          - wallet
                      status:
                        type: string
                        enum:
                          - active
                          - expired
                          - revoked
                      last4:
                        type: string
                        nullable: true
                      brand:
                        type: string
                        nullable: true
                      expiry_month:
                        type: integer
                        nullable: true
                      expiry_year:
                        type: integer
                        nullable: true
                      fingerprint:
                        type: string
                        nullable: true
                      billing_name:
                        type: string
                        nullable: true
                      billing_email:
                        type: string
                        nullable: true
                      metadata:
                        type: object
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
              examples:
                created:
                  value:
                    payment_method:
                      id: cmf1pm123
                      merchant_id: cmf1merchant123
                      customer_id: "{{customerId}}"
                      type: card
                      status: active
                      last4: "4242"
                      brand: visa
                      expiry_month: 12
                      expiry_year: 2028
                      fingerprint: a1b2c3d4e5f67890
                      billing_name: Jane Customer
                      billing_email: jane@example.com
                      metadata: null
                      created_at: 2026-03-01T10:00:00.000Z
                      updated_at: 2026-03-01T10:00:00.000Z
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/payment_methods/{id}:
    get:
      summary: Get payment method by ID
      description: Returns a single payment method scoped to the authenticated merchant.
      x-platform:
        kind: resource
        entity: PaymentMethod
        affectsLedger: false
      operationId: getPaymentMethod
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Payment method found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payment_method
                properties:
                  payment_method:
                    type: object
              examples:
                found:
                  value:
                    payment_method:
                      id: cmf1pm123
                      merchant_id: cmf1merchant123
                      customer_id: cmf1customer123
                      type: card
                      status: active
                      last4: "4242"
                      brand: visa
                      created_at: 2026-03-01T10:00:00.000Z
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment method not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error:
                      code: PAYMENT_METHOD_NOT_FOUND
                      message: Payment method not found.
    patch:
      summary: Update payment method billing info
      description: >
        Updates billing details or metadata on an existing payment method. Emits `payment_method.updated`. Cannot update
        revoked methods.
      x-platform:
        kind: transition
        entity: PaymentMethod
        emitsEvents:
          - payment_method.updated
        affectsLedger: false
        stateChanges:
          - metadata_updated
      operationId: updatePaymentMethod
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                billing_name:
                  type: string
                billing_email:
                  type: string
                  format: email
                metadata:
                  type: object
                  additionalProperties: true
            examples:
              updateBilling:
                value:
                  billing_name: Jane Updated
                  billing_email: updated@example.com
      responses:
        "200":
          description: Payment method updated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payment_method
                properties:
                  payment_method:
                    type: object
              examples:
                updated:
                  value:
                    payment_method:
                      id: cmf1pm123
                      billing_name: Jane Updated
                      billing_email: updated@example.com
                      status: active
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment method not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot update a revoked payment method.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                revoked:
                  value:
                    error:
                      code: PAYMENT_METHOD_REVOKED
                      message: Cannot update a revoked payment method.
    delete:
      summary: Detach/revoke payment method
      description: >
        Revokes a payment method, setting its status to `revoked`. Emits `payment_method.revoked`. Idempotent —
        already-revoked returns 409.
      x-platform:
        kind: transition
        entity: PaymentMethod
        stateChanges:
          - active -> revoked
          - expired -> revoked
        emitsEvents:
          - payment_method.revoked
        affectsLedger: false
      operationId: deletePaymentMethod
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Payment method revoked.
          content:
            application/json:
              schema:
                type: object
                required:
                  - payment_method
                properties:
                  payment_method:
                    type: object
              examples:
                revoked:
                  value:
                    payment_method:
                      id: cmf1pm123
                      status: revoked
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment method not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment method is already revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/customers/{id}/payment_methods:
    get:
      summary: List customer payment methods
      description: Returns a paginated list of payment methods attached to a specific customer.
      x-platform:
        kind: resource
        entity: PaymentMethod
        affectsLedger: false
      operationId: listCustomerPaymentMethods
      tags:
        - PaymentMethods
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: type
          description: Filter by payment method type.
          schema:
            type: string
            enum:
              - card
              - bank_account
              - wallet
        - in: query
          name: status
          description: Filter by payment method status.
          schema:
            type: string
            enum:
              - active
              - expired
              - revoked
      responses:
        "200":
          description: Paginated list of customer payment methods.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
              examples:
                page:
                  value:
                    data:
                      - id: cmf1pm123
                        type: card
                        status: active
                        last4: "4242"
                        brand: visa
                    pagination:
                      page: 1
                      pageSize: 10
                      total: 1
                      hasMore: false
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/setup_intents:
    get:
      summary: List setup intents
      description: Returns a paginated list of setup intents for the authenticated merchant.
      x-platform:
        kind: resource
        entity: SetupIntent
        affectsLedger: false
      operationId: listSetupIntents
      tags:
        - SetupIntents
      security:
        - MerchantKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - in: query
          name: customer_id
          description: Filter by customer ID.
          schema:
            type: string
        - in: query
          name: status
          description: Filter by setup intent status.
          schema:
            type: string
            enum:
              - created
              - processing
              - succeeded
              - failed
              - canceled
      responses:
        "200":
          description: Paginated list of setup intents.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
              examples:
                page:
                  value:
                    data:
                      - id: cmf1si123
                        merchant_id: cmf1merchant123
                        customer_id: cmf1customer123
                        status: created
                        usage: off_session
                    pagination:
                      page: 1
                      pageSize: 10
                      total: 1
                      hasMore: false
        "400":
