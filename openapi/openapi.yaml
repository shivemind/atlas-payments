components:
  securitySchemes:
    MerchantKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for merchant-scoped operations. Pass as `Authorization: Bearer {{merchantApiKey}}`.
    PlatformAdminKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer API key for platform admin operations. Pass as `Authorization: Bearer {{platformAdminKey}}`.
  schemas:
    ErrorResponse:
      description: Standard error response envelope returned for 4xx/5xx responses.
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code.
            message:
              type: string
              description: Human-readable error description.
    PaginationMeta:
      description: Pagination metadata included in list responses.
      type: object
      required:
        - page
        - pageSize
        - total
        - hasMore
      properties:
        page:
          type: integer
          description: Current page number (1-indexed).
        pageSize:
          type: integer
          description: Number of results per page.
        total:
          type: integer
          description: Total number of matching records.
        hasMore:
          type: boolean
          description: Whether additional pages exist.
    CreditNote:
      description: A credit note issued against an invoice.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        invoice_id:
          type: string
        number:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - issued
            - void
        reason:
          type: string
          nullable: true
        amount:
          type: integer
        currency:
          type: string
        voided_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreditNoteLineItem:
      description: A line item on a credit note.
      type: object
      properties:
        id:
          type: string
        credit_note_id:
          type: string
        description:
          type: string
        quantity:
          type: integer
        unit_amount:
          type: integer
        amount:
          type: integer
        created_at:
          type: string
          format: date-time
    Event:
      description: A domain event representing a state change in the system.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        type:
          type: string
          description: Event type (e.g. payment_intent.succeeded).
        entity_type:
          type: string
          description: Type of entity that triggered the event.
        entity_id:
          type: string
          description: ID of the entity that triggered the event.
        payload:
          type: object
          description: Event payload with entity snapshot.
        actor_type:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    WebhookEndpoint:
      description: A registered webhook endpoint for receiving event notifications.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        url:
          type: string
          format: uri
        is_active:
          type: boolean
        enabled_events:
          type: array
          items:
            type: string
        secret:
          type: string
          description: Only included on creation and rotate.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WebhookDelivery:
      description: A webhook delivery record with attempt history.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        webhook_endpoint_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
        status:
          type: string
          enum:
            - PENDING
            - DELIVERED
            - FAILED
        delivered_at:
          type: string
          format: date-time
          nullable: true
        next_attempt_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        attempts:
          type: array
          items:
            type: object
            properties:
              attempt_number:
                type: integer
              response_status:
                type: integer
                nullable: true
              created_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
                nullable: true
    Adjustment:
      description: A credit or debit adjustment.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        type:
          type: string
          enum:
            - credit
            - debit
        amount:
          type: integer
        currency:
          type: string
        description:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Dispute:
      description: A payment dispute.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        payment_intent_id:
          type: string
        status:
          type: string
          enum:
            - needs_response
            - under_review
            - won
            - lost
            - accepted
            - expired
        reason:
          type: string
          enum:
            - fraudulent
            - duplicate
            - not_received
            - product_unacceptable
            - subscription_canceled
            - other
        amount:
          type: integer
        currency:
          type: string
        due_by:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DisputeEvidence:
      description: A piece of evidence for a dispute.
      type: object
      properties:
        id:
          type: string
        dispute_id:
          type: string
        type:
          type: string
          enum:
            - receipt
            - shipping_proof
            - customer_communication
            - service_documentation
            - policy_disclosure
            - other
        file_name:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Representment:
      description: A dispute representment.
      type: object
      properties:
        id:
          type: string
        dispute_id:
          type: string
        submitted_at:
          type: string
          format: date-time
          nullable: true
        outcome:
          type: string
          nullable: true
        details:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingProfile:
      description: Merchant onboarding / KYB profile.
      type: object
      properties:
        id:
          type: string
        merchant_id:
          type: string
        business_name:
          type: string
          nullable: true
        business_type:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - started
            - submitted
            - under_review
            - approved
            - denied
            - withdrawn
        submitted_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Owner:
      description: Beneficial owner attached to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          nullable: true
        ownership_percentage:
          type: integer
          nullable: true
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingDocument:
      description: Document record for KYB verification.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        type:
          type: string
          enum:
            - government_id
            - proof_of_address
            - bank_statement
            - tax_return
            - articles_of_incorporation
            - other
        status:
          type: string
          enum:
            - pending
            - verified
            - rejected
        file_name:
          type: string
        file_size:
          type: integer
          nullable: true
        mime_type:
          type: string
          nullable: true
        review_note:
          type: string
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OnboardingBankAccount:
      description: Bank account attached to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        bank_name:
          type: string
        account_holder_name:
          type: string
        routing_number:
          type: string
        account_number_last4:
          type: string
        account_type:
          type: string
          enum:
            - checking
            - savings
        is_verified:
          type: boolean
        is_primary:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UnderwritingCase:
      description: Underwriting review case linked to an onboarding profile.
      type: object
      properties:
        id:
          type: string
        onboarding_profile_id:
          type: string
        assigned_to:
          type: string
          nullable: true
        risk_score:
          type: integer
