name: Postman API Catalog Onboarding
on:
  workflow_dispatch:

jobs:
  onboard-atlas-payments:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: postman-cs/postman-api-onboarding-action@v0
        with:
          project-name: atlas-payments
          workspace-id: b810d61e-7b57-480a-ab10-687bcb04ef4e
          spec-url: https://raw.githubusercontent.com/shivemind/atlas-payments/main/openapi/openapi.yaml
          environments-json: '["prod","dev"]'
          env-runtime-urls-json: '{"prod":"https://atlas-payments.vercel.app","dev":"http://localhost:3000"}'
          generate-ci-workflow: false
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  onboard-atlas-billing:
