name: Postman Catalog Onboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  collection-run:
    name: Run API Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection
        run: |
          postman collection run 52400725-3093dadc-a0f9-4f56-a0f4-8036cbffacc9 \
            -e 52400725-0c710169-0cbd-4a5b-86d3-544bc94a58bf \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }} \
            || true

      - name: Trigger Monitor Run
        run: |
          curl -s -X POST "https://api.getpostman.com/monitors/1f11e3f5-299c-4c60-8e96-88e47cde3253/run" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            || true

      - name: Summary
        if: always()
        run: |
          echo "### Postman Catalog Onboard" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: 52400725-3093dadc-a0f9-4f56-a0f4-8036cbffacc9" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: 52400725-0c710169-0cbd-4a5b-86d3-544bc94a58bf" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace**: [b810d61e-7b57-480a-ab10-687bcb04ef4e](https://go.postman.co/workspace/b810d61e-7b57-480a-ab10-687bcb04ef4e)" >> $GITHUB_STEP_SUMMARY
          echo "- **Monitor**: 1f11e3f5-299c-4c60-8e96-88e47cde3253" >> $GITHUB_STEP_SUMMARY