name: Check All Workspace Links
on:
  workflow_dispatch:

jobs:
  check-all:
    runs-on: ubuntu-latest
    steps:
      - name: Check Bifrost links for all workspaces
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          WORKSPACES=(
            "b810d61e-7b57-480a-ab10-687bcb04ef4e|Atlas Payments|atlas-payments"
            "9741a9ce-4df3-4236-bf21-bb14795f2e74|Atlas Billing|atlas-billing"
            "44fd816d-618b-4d67-bba0-6505364909de|Atlas Risk|atlas-risk-disputes"
            "602f27e3-2272-4ead-8760-9d3dbe5078f9|Atlas Treasury|atlas-treasury"
            "95332ec2-c81c-4224-86ea-53127f34d15f|Atlas Platform|atlas-platform"
            "40272a8d-a6c1-4d8a-bc17-6695a9f08972|echo-atlas|echo_atlas"
            "a50959cb-b5b5-4e89-823d-a57e88f658f4|ChasingCats|chasingCats"
          )

          for entry in "${WORKSPACES[@]}"; do
            IFS='|' read -r WS_ID NAME REPO <<< "$entry"
            EXPECTED="https://github.com/shivemind/$REPO"
            
            RESP=$(curl -s -X POST \
              "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
              -H "Content-Type: application/json" \
              -H "x-access-token: $ACCESS_TOKEN" \
              -H "x-entity-team-id: " \
              -d "{\"service\":\"workspaces\",\"method\":\"GET\",\"path\":\"/workspaces/$WS_ID/filesystem\",\"body\":{}}")
            
            LINKED=$(echo "$RESP" | jq -r '.data.repo // "NOT LINKED"')
            
            if [ "$LINKED" = "$EXPECTED" ]; then
              echo "✅ $NAME -> $LINKED"
            elif [ "$LINKED" = "NOT LINKED" ]; then
              echo "❌ $NAME -> NOT LINKED (expected $EXPECTED)"
            else
              echo "⚠️  $NAME -> $LINKED (expected $EXPECTED)"
            fi
          done