name: Insights Catalog Onboarding

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  onboard:
    name: Link to API Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: postman-cs/postman-insights-onboarding-action@v0
        id: insights
        env:
          INPUT_PROJECT_NAME: atlas-payments
          INPUT_WORKSPACE_ID: b810d61e-7b57-480a-ab10-687bcb04ef4e
          INPUT_ENVIRONMENT_ID: 0c710169-0cbd-4a5b-86d3-544bc94a58bf
          INPUT_CLUSTER_NAME: atlas-production
          INPUT_GIT_OWNER: shivemind
          INPUT_GIT_REPOSITORY_NAME: atlas-payments
          INPUT_POSTMAN_ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          INPUT_POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          INPUT_POSTMAN_TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_POLL_TIMEOUT_SECONDS: "180"
          INPUT_POLL_INTERVAL_SECONDS: "10"
        with:
          project-name: atlas-payments
          workspace-id: b810d61e-7b57-480a-ab10-687bcb04ef4e
          environment-id: 0c710169-0cbd-4a5b-86d3-544bc94a58bf
          cluster-name: atlas-production
          git-owner: shivemind
          git-repository-name: atlas-payments
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-team-id: ${{ secrets.POSTMAN_TEAM_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          poll-timeout-seconds: "180"

      - name: Report
        if: always()
        run: |
          echo "Status: ${{ steps.insights.outputs.status }}"
          echo "Service: ${{ steps.insights.outputs.discovered-service-name }}"
          echo "App ID: ${{ steps.insights.outputs.application-id }}"
          echo "Verification Token: ${{ steps.insights.outputs.verification-token }}"